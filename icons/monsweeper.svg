<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252842"/>
      <stop offset="100%" stop-color="#1a1b2e"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="27" fill="url(#bg)"/>
  <!-- Grid of cells -->
  <g transform="translate(24, 24)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="22" height="22" rx="3" fill="#2d5a3a"/>
    <rect x="25" y="0" width="22" height="22" rx="3" fill="#2d5a3a"/>
    <rect x="50" y="0" width="22" height="22" rx="3" fill="#1e4a2c"/>
    <!-- Row 2 -->
    <rect x="0" y="25" width="22" height="22" rx="3" fill="#1e4a2c"/>
    <rect x="25" y="25" width="22" height="22" rx="3" fill="#2d5a3a"/>
    <rect x="50" y="25" width="22" height="22" rx="3" fill="#2d5a3a"/>
    <!-- Row 3 -->
    <rect x="0" y="50" width="22" height="22" rx="3" fill="#2d5a3a"/>
    <rect x="25" y="50" width="22" height="22" rx="3" fill="#1e4a2c"/>
    <rect x="50" y="50" width="22" height="22" rx="3" fill="#2d5a3a"/>
  </g>
  <!-- Pokeball on revealed cell -->
  <circle cx="84" cy="84" r="10" fill="#ffd700" opacity="0.9"/>
  <line x1="74" y1="84" x2="94" y2="84" stroke="#1a1b2e" stroke-width="2"/>
  <circle cx="84" cy="84" r="3.5" fill="#1a1b2e"/>
  <circle cx="84" cy="84" r="2" fill="#ffd700"/>
  <!-- Mine/bomb on one cell -->
  <text x="35" y="42" font-size="14" text-anchor="middle" fill="#f87171">*</text>
</svg>
